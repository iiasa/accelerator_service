apiVersion: apps/v1
kind: Deployment
metadata:
  name: accelerator-be
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accelerator-be
  template:
    metadata:
      labels:
        app: accelerator-be
      annotations:
        kubernetes.io/restart-at: "2025-10-22T10:50:43+0410"
    spec:
      containers:
      - name: acc-be
        # image: registry.iiasa.ac.at/accelerator/iiasa-acc-be:a1837404
        image: registry.iiasa.ac.at/accelerator/iiasa-acc-be:fbc95a5a
        envFrom:
          - secretRef:
              name: accelerator-be-secret
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          limits:
            memory: "4095Mi"
            cpu: "4000m"
            ephemeral-storage: "2Gi"
          requests:
            memory: "4095Mi"
            cpu: "4000m"
            ephemeral-storage: "2Gi"
      
      
      imagePullSecrets:
        - name: iiasaregcred
---
apiVersion: v1
kind: Service
metadata:
  name: accelerator-be-service
spec:
  type: NodePort
  selector:
    app: accelerator-be
  ports:
    - protocol: TCP
      port: 8770
      targetPort: 8000
      nodePort: 30106
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: registry.iiasa.ac.at/accelerator/redis:d842c43
        resources:
          limits:
            memory: "1024Mi"
            cpu: "1000m"
          requests:
            memory: "1024Mi"
            cpu: "1000m"
        envFrom:
          - secretRef:
              name: redis-secret
        ports:
        - containerPort: 6379
      imagePullSecrets:
        - name: iiasaregcred
      #   volumeMounts:
      #   - name: redis-data
      #     mountPath: /data
      # volumes:
      # - name: redis-data
      #   persistentVolumeClaim:
      #     claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379